<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0e0d">
<title>BrewLog Pro — Tesseract OCR</title>
<script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #0f0e0d; --bg2: #1a1816; --bg3: #242220;
    --gold: #c9a96e; --cream: #f5f0e8; --muted: #6b6560; --border: #3a3530;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--cream); font-family: 'Noto Sans Thai', sans-serif; max-width: 420px; margin: 0 auto; padding-bottom: 50px; }
  
  .nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'DM Mono', monospace; color: var(--gold); font-size: 1.2rem; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab { flex: 1; text-align: center; padding: 15px; color: var(--muted); cursor: pointer; font-size: 14px; }
  .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

  .scan-btn-wrapper { margin: 15px; background: var(--bg2); border: 2px dashed var(--border); border-radius: 15px; padding: 30px; text-align: center; position: relative; cursor: pointer; }
  .scan-btn-wrapper i { font-size: 40px; color: var(--gold); display: block; margin-bottom: 10px; }
  #camera-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .form-group { padding: 0 15px; margin-bottom: 15px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .form-group input, .form-group textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; font-size: 15px; outline: none; }
  
  .btn-save { background: var(--gold); color: black; border: none; width: calc(100% - 30px); margin: 15px; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
  
  #loading { display: none; text-align: center; margin: 10px; color: var(--gold); font-size: 13px; }
  .progress-bar { width: 80%; height: 4px; background: var(--bg3); margin: 10px auto; border-radius: 2px; overflow: hidden; }
  #progress-fill { width: 0%; height: 100%; background: var(--gold); transition: width 0.3s; }

  .history-item { background: var(--bg2); margin: 10px 15px; padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); }
</style>
</head>
<body>

<div class="nav">
  <div class="logo">BREWLOG.PRO</div>
  <i class="ti ti-scan" style="color:var(--gold)"></i>
</div>

<div class="tabs">
  <div class="tab active" id="tab-brew" onclick="showPage('brew')">ชงกาแฟ</div>
  <div class="tab" id="tab-history" onclick="showPage('history')">ประวัติ</div>
</div>

<div id="page-brew">
  <div style="padding: 15px; font-size: 11px; color: var(--muted); text-align: center;">
    โหมดสแกน: Tesseract.js (ประมวลผลในเครื่อง)
  </div>

  <div class="scan-btn-wrapper">
    <input type="file" accept="image/*" capture="environment" id="camera-input" onchange="startScan(this)">
    <i class="ti ti-camera"></i>
    <strong>ถ่ายภาพหน้าซองกาแฟ</strong>
    <p style="font-size:12px; color:var(--muted); margin-top:5px;">จะพยายามอ่านข้อความอัตโนมัติ</p>
  </div>

  <div id="loading">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <span id="status-text">กำลังโหลด Library...</span>
  </div>

  <div class="form-group">
    <label>ชื่อกาแฟ / โรงคั่ว</label>
    <input type="text" id="coffee-name" placeholder="ชื่อที่ปรากฏบนซอง">
  </div>

  <div class="form-group">
    <label>รสชาติ (Tasting Notes)</label>
    <textarea id="coffee-notes" rows="2" placeholder="เช่น Berry, Chocolate, Nutty"></textarea>
  </div>

  <div class="form-group">
    <div style="display:flex; gap:10px;">
      <div style="flex:1">
        <label>กาแฟ (g)</label>
        <input type="number" id="dose" value="18">
      </div>
      <div style="flex:1">
        <label>น้ำรวม (ml)</label>
        <input type="number" id="water" value="250">
      </div>
    </div>
  </div>

  <button class="btn-save" onclick="saveLog()">บันทึกข้อมูลการชง</button>
</div>

<div id="page-history" style="display:none">
  <div id="history-list"></div>
</div>

<script>
  window.onload = () => loadHistory();

  function showPage(p) {
    document.getElementById('page-brew').style.display = p === 'brew' ? 'block' : 'none';
    document.getElementById('page-history').style.display = p === 'history' ? 'block' : 'none';
    document.getElementById('tab-brew').classList.toggle('active', p === 'brew');
    document.getElementById('tab-history').classList.toggle('active', p === 'history');
    if(p === 'history') loadHistory();
  }

  // ฟังก์ชันสแกนหลักด้วย Tesseract.js
  async function startScan(input) {
    const file = input.files[0];
    if(!file) return;

    const loadingDiv = document.getElementById('loading');
    const statusText = document.getElementById('status-text');
    const progressFill = document.getElementById('progress-fill');
    
    loadingDiv.style.display = 'block';

    try {
      // 1. เรียกใช้งาน Tesseract
      const result = await Tesseract.recognize(
        file,
        'eng', // ระบุภาษา (eng เป็นพื้นฐานที่ดีสำหรับซองกาแฟ)
        { 
          logger: m => {
            if(m.status === 'recognizing text') {
              statusText.innerText = `กำลังอ่านข้อความ... ${(m.progress * 100).toFixed(0)}%`;
              progressFill.style.width = `${m.progress * 100}%`;
            } else {
              statusText.innerText = 'กำลังเตรียมระบบ...';
            }
          }
        }
      );

      // 2. ดึงข้อความที่อ่านได้
      const rawText = result.data.text;
      console.log("Raw Scan:", rawText);

      // 3. Logic แยกข้อมูลแบบง่าย (Tesseract จะไม่ออกมาเป็น JSON เหมือน Gemini)
      // เราจะเอาบรรทัดแรกเป็นชื่อกาแฟ และบรรทัดที่เหลือใส่ใน Notes
      const lines = rawText.split('\n').filter(l => l.trim().length > 3);
      
      if(lines.length > 0) {
        document.getElementById('coffee-name').value = lines[0].trim();
        // เอาบรรทัดที่เหลือมาต่อกันเป็น notes
        document.getElementById('coffee-notes').value = lines.slice(1).join(', ').substring(0, 150);
        alert('✨ อ่านข้อมูลเสร็จแล้ว (กรุณาตรวจสอบความถูกต้องอีกครั้ง)');
      } else {
        alert('พบบรรทัดข้อความน้อยเกินไป ลองถ่ายภาพให้ชัดขึ้น');
      }

    } catch (err) {
      console.error(err);
      alert('เกิดข้อผิดพลาดในการสแกน: ' + err.message);
    } finally {
      loadingDiv.style.display = 'none';
      progressFill.style.width = '0%';
      input.value = ""; 
    }
  }

  function saveLog() {
    const name = document.getElementById('coffee-name').value;
    if(!name) return alert('ใส่ชื่อกาแฟด้วยจ้า');

    const log = {
      name,
      notes: document.getElementById('coffee-notes').value,
      dose: document.getElementById('dose').value,
      water: document.getElementById('water').value,
      date: new Date().toLocaleString('th-TH')
    };

    const logs = JSON.parse(localStorage.getItem('coffee_logs') || '[]');
    logs.unshift(log);
    localStorage.setItem('coffee_logs', JSON.stringify(logs));
    alert('บันทึกสำเร็จ!');
    showPage('history');
  }

  function loadHistory() {
    const logs = JSON.parse(localStorage.getItem('coffee_logs') || '[]');
    const list = document.getElementById('history-list');
    list.innerHTML = logs.map(l => `
      <div class="history-item">
        <small style="color:var(--muted)">${l.date}</small>
        <div style="font-weight:600; font-size:16px; margin:5px 0;">${l.name}</div>
        <div style="font-size:13px; color:var(--gold)">${l.dose}g / ${l.water}ml (1:${(l.water/l.dose).toFixed(1)})</div>
        <div style="font-size:12px; color:var(--muted); margin-top:5px;">${l.notes}</div>
      </div>
    `).join('') || '<p style="text-align:center; margin-top:50px; color:var(--muted);">ยังไม่มีประวัติการชง</p>';
  }
</script>

</body>
</html>
